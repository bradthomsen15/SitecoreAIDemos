    - ID: "62c99938-d40e-4878-ab77-3464abd79fd5"
      Hint: ShortDescription
      Value: |
        Le nom Brooks Glycerin est synonyme de l'ultime en matière d'amorti et de confort pour chaussures de course.
        
        La collection a évolué au fil du temps en quatre styles distincts sous le nom de Glycerin : le Glycerin original, le Glycerin GTS, le Glycerin Max et le dernier entrant, le Glycerin Flex. Chaque type de chaussure offre une expérience distincte alimentée par notre technologie DNA TUNED infusée d'azote. Que vous souhaitiez de la flexibilité, de la structure ou une protection maximale, il y a une chaussure Glycerin conçue pour offrir des atterrissages en douceur et des décollages puissants pour votre foulée spécifique. Voici comment trouver les bonnes chaussures Brooks Glycerin pour vous.
        
        
