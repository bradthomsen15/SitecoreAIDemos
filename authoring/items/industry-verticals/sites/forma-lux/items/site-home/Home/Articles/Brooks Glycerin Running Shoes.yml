    - ID: "62c99938-d40e-4878-ab77-3464abd79fd5"
      Hint: ShortDescription
      Value: |
        The Brooks Glycerin name is synonymous with the ultimate in running shoe cushioning and comfort.
        
        The collection has evolved over time into four distinct styles under the Glycerin name: the original Glycerin, the Glycerin GTS, the Glycerin Max, and the newest entrant, the Glycerin Flex. Each shoe type offers a distinct experience powered by our nitrogen-infused DNA TUNED technology. Whether you want flexibility, structure, or maximum protection, there’s a Glycerin shoe engineered to provide soft landings and powerful toe-offs for your specific stride. Here is how to find the right Brooks Glycerin shoes for you.
        
        
